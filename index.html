<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meal Planner</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    body{margin:0;font-family:Nunito;background:#FAE8E4;}
    button{font-family:Nunito;cursor:pointer;}
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

/* ===================== APP ===================== */

function App(){
  const [menu,setMenu] = useState(null);
  const [show,setShow] = useState(false);

  return(
    <div style={{padding:20}}>
      <h2>🥗 Meal Planner</h2>

      <button
        onClick={()=>setShow(true)}
        style={{
          padding:12,
          background:"#E8879E",
          color:"#fff",
          border:"none",
          borderRadius:12,
          fontWeight:800
        }}
      >
        Generar menú IA
      </button>

      {menu && (
        <pre style={{
          marginTop:20,
          background:"#fff",
          padding:10,
          borderRadius:10
        }}>
          {JSON.stringify(menu,null,2)}
        </pre>
      )}

      {show && (
        <AIMenuModal
          onClose={()=>setShow(false)}
          onGenerate={(m)=>{
            setMenu(m);
            setShow(false);
          }}
        />
      )}
    </div>
  );
}

/* ===================== IA MODAL ===================== */

function AIMenuModal({onGenerate,onClose}){

  const [avoid,setAvoid] = useState("");
  const [extra,setExtra] = useState("");
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState("");

  async function go(){
    setLoading(true);
    setError("");

    try{
      const res = await fetch("/api/menu",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          preferences: extra,
          avoid: avoid
        })
      });

      const data = await res.json();

      console.log("RESPUESTA:", data);

      if(!res.ok){
        throw new Error("HTTP error");
      }

      if(!data || !data.menu){
        throw new Error("Sin menú");
      }

      onGenerate(data.menu);

    }catch(e){
      console.error(e);
      setError("⚠️ Error al generar. Inténtalo de nuevo.");
    }

    setLoading(false);
  }

  return(
    <div style={{
      position:"fixed",
      inset:0,
      background:"#00000066",
      display:"flex",
      alignItems:"flex-end",
      justifyContent:"center"
    }}
    onClick={onClose}
    >

      <div
        onClick={e=>e.stopPropagation()}
        style={{
          background:"#fff",
          width:"100%",
          maxWidth:500,
          padding:20,
          borderRadius:"20px 20px 0 0"
        }}
      >

        <h3>🤖 Generar menú IA</h3>

        <textarea
          placeholder="Preferencias (ej: más pescado, keto)"
          value={extra}
          onChange={e=>setExtra(e.target.value)}
          style={{width:"100%",padding:10,marginTop:10}}
        />

        <input
          placeholder="Alimentos a evitar"
          value={avoid}
          onChange={e=>setAvoid(e.target.value)}
          style={{width:"100%",padding:10,marginTop:10}}
        />

        {error && (
          <div style={{color:"red",marginTop:10,fontWeight:700}}>
            {error}
          </div>
        )}

        <button
          onClick={go}
          disabled={loading}
          style={{
            width:"100%",
            marginTop:15,
            padding:12,
            background:"#E8879E",
            color:"#fff",
            border:"none",
            borderRadius:12,
            fontWeight:900
          }}
        >
          {loading ? "Generando..." : "Generar menú"}
        </button>

      </div>
    </div>
  );
}

/* ===================== RENDER ===================== */

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
