<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#FAE8E4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Meal Planner" />
  <title>Meal Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#FAE8E4;font-family:'Nunito',sans-serif;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:#D9C8C5;border-radius:10px;}
    input:focus,textarea:focus{border-color:#F2A8BB!important;outline:none;box-shadow:0 0 0 3px #F2A8BB15;}
    button{font-family:'Nunito',sans-serif;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const DAYS   = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
const MEALS  = ["Comida","Cena"];
const CATEGORIES = ["Pollo","Ternera","Cerdo","Pescado","Marisco","Verdura","Legumbre","Huevo","Pasta","Arroz","Sopa","Ensalada","Fruta","Lácteo","Otro"];
const DIET_TAGS  = ["Keto","Anti-inflamatoria","Sin gluten","Sin lactosa","Vegano","Vegetariano","Alto en proteína","Bajo en carbos"];

const T = {
  pageBg:"#FAE8E4",cardBg:"#FFFFFF",cardBorder:"#D9C8C5",
  dayPill:"#F2A8BB",dayPillText:"#3D2525",
  mealTag:"#93C9C0",mealTagText:"#1C4F49",mealTagBorder:"#6FB5AC",
  placeholder:"#C4A8A3",mainText:"#2E1E1C",subText:"#7A5E5A",
  navBg:"#FFFFFF",navBorder:"#EDD8D4",navInactive:"#B09490",
  accentPink:"#E8879E",accentMint:"#5AAA9F",accentPurple:"#8060B0",
};

const inp = {
  border:`1.5px solid ${T.cardBorder}`,borderRadius:12,padding:"9px 12px",
  fontSize:14,outline:"none",fontFamily:"inherit",width:"100%",
  boxSizing:"border-box",background:"#FFF8F7",color:T.mainText,
};

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function makeSlot(){return {items:[]};}
function makeWeek(){const w={};DAYS.forEach(d=>{w[d]={};MEALS.forEach(m=>{w[d][m]=makeSlot();});});return w;}

// ── Data migration: never lose planning on updates ─────────────────────────────
function migrateWeeks(){
  // Already on latest format?
  const latest=ls("weeks3",null);
  if(latest){
    // Ensure all slots have items array (in case of partial old data)
    const fixed=latest.map(week=>{
      const w={...week};
      DAYS.forEach(d=>{
        if(!w[d])w[d]={};
        MEALS.forEach(m=>{
          if(!w[d][m])w[d][m]=makeSlot();
          // Old format: {name, macros, recipeId} → new format: {items:[...]}
          if(w[d][m].name!==undefined){
            const entry=w[d][m];
            w[d][m]=makeSlot();
            if(entry.name){
              w[d][m].items=[{id:Date.now()+Math.random()*9999,name:entry.name,macros:entry.macros||{},recipeId:entry.recipeId||null,rating:entry.rating||0,isIngredient:false}];
            }
          }
          if(!w[d][m].items)w[d][m].items=[];
        });
      });
      return w;
    });
    ss("weeks3",fixed);
    return fixed;
  }
  // Try weeks2
  const v2=ls("weeks2",null);
  if(v2){
    const migrated=v2.map(week=>{
      const w={};
      DAYS.forEach(d=>{
        w[d]={};
        MEALS.forEach(m=>{
          const slot=week[d]&&week[d][m];
          if(!slot){w[d][m]=makeSlot();return;}
          // weeks2 used {items:[]}
          if(slot.items){w[d][m]=slot;return;}
          // older: {name, macros}
          w[d][m]=makeSlot();
          if(slot.name){
            w[d][m].items=[{id:Date.now()+Math.random()*9999,name:slot.name,macros:slot.macros||{},recipeId:slot.recipeId||null,rating:slot.rating||0,isIngredient:false}];
          }
        });
      });
      return w;
    });
    ss("weeks3",migrated);
    return migrated;
  }
  // Try weeks (original v1)
  const v1=ls("weeks",null);
  if(v1){
    const migrated=v1.map(week=>{
      const w={};
      DAYS.forEach(d=>{
        w[d]={};
        MEALS.forEach(m=>{
          const slot=week[d]&&week[d][m];
          w[d][m]=makeSlot();
          if(slot&&slot.name){
            w[d][m].items=[{id:Date.now()+Math.random()*9999,name:slot.name,macros:slot.macros||{},recipeId:slot.recipeId||null,rating:slot.rating||0,isIngredient:false}];
          }
        });
      });
      return w;
    });
    ss("weeks3",migrated);
    return migrated;
  }
  // No data at all → fresh start
  const fresh=[makeWeek(),makeWeek()];
  ss("weeks3",fresh);
  return fresh;
}

// ── UI ─────────────────────────────────────────────────────────────────────────
function Pill({children,onClick,bg=T.accentPink,color="#fff",style={},disabled=false}){
  return <button onClick={onClick} disabled={disabled} style={{background:bg,color,border:"none",borderRadius:30,padding:"8px 20px",fontWeight:800,fontSize:13,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.55:1,transition:"all 0.15s",...style}}>{children}</button>;
}

function Stars({value,onChange,size=16}){
  return <div style={{display:"flex",gap:1}}>{[1,2,3,4,5].map(i=>(
    <span key={i} onClick={e=>{e.stopPropagation();onChange&&onChange(i===value?0:i);}}
      style={{fontSize:size,cursor:onChange?"pointer":"default",color:i<=value?"#F59E0B":"#DDD0CB",lineHeight:1}}>★</span>
  ))}</div>;
}

function MacroChips({macros}){
  if(!macros)return null;
  const chips=[{k:"kcal",l:"⚡",v:macros.kcal,c:"#E6933A"},{k:"prot",l:"P",v:macros.prot,c:T.accentMint},{k:"carbs",l:"C",v:macros.carbs,c:"#6B9FD4"},{k:"fat",l:"G",v:macros.fat,c:"#D47BA0"}].filter(x=>x.v);
  if(!chips.length)return null;
  return <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:3}}>{chips.map(x=><span key={x.k} style={{fontSize:10,fontWeight:800,padding:"1px 7px",borderRadius:20,background:x.c+"20",color:x.c,fontFamily:"monospace"}}>{x.l} {x.v}{x.k==="kcal"?" kcal":"g"}</span>)}</div>;
}

function DietChips({tags}){
  if(!tags||!tags.length)return null;
  const bg={"Keto":"#FEF9C3","Anti-inflamatoria":"#D1FAE5","Sin gluten":"#FEE2E2","Sin lactosa":"#E0F2FE","Vegano":"#F0FDF4","Vegetariano":"#DCFCE7","Alto en proteína":"#FEF3C7","Bajo en carbos":"#FFF7ED"};
  const tc={"Keto":"#713F12","Anti-inflamatoria":"#065F46","Sin gluten":"#991B1B","Sin lactosa":"#0C4A6E","Vegano":"#14532D","Vegetariano":"#166534","Alto en proteína":"#92400E","Bajo en carbos":"#78350F"};
  return <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:3}}>{tags.slice(0,2).map(t=><span key={t} style={{fontSize:10,fontWeight:800,padding:"1px 7px",borderRadius:20,background:bg[t]||"#F1F5F9",color:tc[t]||"#334155"}}>{t}</span>)}</div>;
}

function CategoryBadge({cat}){
  const bg={Pollo:"#FEF3C7",Ternera:"#FDE8D8",Cerdo:"#FCE7F3",Pescado:"#DBEAFE",Marisco:"#E0F2FE",Verdura:"#D1FAE5",Legumbre:"#FEF9C3",Huevo:"#FFF7ED",Pasta:"#F5F3FF",Arroz:"#F0FDF4",Sopa:"#FFF8ED",Ensalada:"#ECFDF5",Fruta:"#FFF0F3","Lácteo":"#F0F9FF",Otro:"#F1F5F9"};
  const tc={Pollo:"#92400E",Ternera:"#9A3412",Cerdo:"#9D174D",Pescado:"#1E40AF",Marisco:"#0C4A6E",Verdura:"#065F46",Legumbre:"#713F12",Huevo:"#92400E",Pasta:"#4C1D95",Arroz:"#14532D",Sopa:"#78350F",Ensalada:"#064E3B",Fruta:"#9D174D","Lácteo":"#0C4A6E",Otro:"#334155"};
  return <span style={{fontSize:10,fontWeight:800,padding:"1px 8px",borderRadius:20,background:bg[cat]||"#F1F5F9",color:tc[cat]||"#334155"}}>{cat}</span>;
}

// ── AI Menu Generator ──────────────────────────────────────────────────────────
async function generateMenuAI(preferences, avoid){
  const prompt = `Eres un nutricionista experto en dieta keto y anti-inflamatoria.
Crea un menú semanal completo (7 días, comida y cena) para alguien con estas preferencias: ${preferences}.
Alimentos a evitar: ${avoid||"ninguno en especial"}.

Reglas:
- Dieta KETO estricta: sin cereales, sin legumbres, sin azúcar, bajo en carbohidratos
- Anti-inflamatoria: evita ultraprocesados, aceites de semillas, azúcar
- Cada comida y cena debe tener 1-3 platos/componentes
- Varía proteínas: pollo, ternera, cerdo, pescado, huevos, mariscos
- Incluye verduras keto: brócoli, espinacas, aguacate, calabacín, coliflor, etc.

Responde SOLO con JSON válido, sin markdown, sin texto extra:
{
  "menu": {
    "Lunes":    {"Comida":[{"name":"...","category":"..."},{"name":"...","category":"..."}],"Cena":[{"name":"...","category":"..."}]},
    "Martes":   {"Comida":[...],"Cena":[...]},
    "Miércoles":{"Comida":[...],"Cena":[...]},
    "Jueves":   {"Comida":[...],"Cena":[...]},
    "Viernes":  {"Comida":[...],"Cena":[...]},
    "Sábado":   {"Comida":[...],"Cena":[...]},
    "Domingo":  {"Comida":[...],"Cena":[...]}
  }
}`;

  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:prompt}]})
  });
  const data = await res.json();
  const text = data.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
  return JSON.parse(text);
}

// ── AI Menu Modal ──────────────────────────────────────────────────────────────
function AIMenuModal({onGenerate,onClose}){
  const [avoid,setAvoid]=useState(ls("aiAvoid",""));
  const [extra,setExtra]=useState(ls("aiExtra",""));
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");

  async function go(){
    setLoading(true);setError("");
    ss("aiAvoid",avoid);ss("aiExtra",extra);
    try{
      const prefs=`Keto estricto, anti-inflamatoria. ${extra}`;
      const result=await generateMenuAI(prefs,avoid);
      onGenerate(result.menu);
    }catch(e){setError("Error al generar. Inténtalo de nuevo.");}
    setLoading(false);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"#3D252580",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:700}} onClick={!loading?onClose:undefined}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"22px 22px 0 0",padding:"20px 18px 44px",width:"100%",maxWidth:480}}>
        <div style={{width:36,height:4,background:T.cardBorder,borderRadius:4,margin:"0 auto 16px"}} />
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <span style={{fontSize:28}}>🤖</span>
          <div>
            <div style={{fontWeight:900,fontSize:17,color:T.mainText}}>Generar menú con IA</div>
            <div style={{fontSize:12,color:T.subText}}>Keto · Anti-inflamatoria · 7 días</div>
          </div>
        </div>

        <div style={{background:"#FEF9C3",borderRadius:12,padding:12,marginBottom:14,border:"1px solid #FDE68A"}}>
          <div style={{fontSize:11,fontWeight:800,color:"#713F12",marginBottom:6,letterSpacing:0.5}}>⚠️ ALIMENTOS A EVITAR</div>
          <input value={avoid} onChange={e=>setAvoid(e.target.value)}
            placeholder="Ej: pepino, salmón, cebolla..." style={inp} />
        </div>

        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:800,color:T.placeholder,marginBottom:6,letterSpacing:0.5}}>PREFERENCIAS EXTRA (opcional)</div>
          <input value={extra} onChange={e=>setExtra(e.target.value)}
            placeholder="Ej: sin cerdo, más pescado, comidas rápidas..." style={inp} />
        </div>

        {error&&<div style={{color:"#E57373",fontSize:13,marginBottom:12,textAlign:"center"}}>⚠️ {error}</div>}

        {loading?(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:32,marginBottom:8}}>⏳</div>
            <div style={{fontWeight:800,color:T.mainText,fontSize:15}}>Creando tu menú...</div>
            <div style={{fontSize:12,color:T.subText,marginTop:4}}>La IA está eligiendo tus platos</div>
          </div>
        ):(
          <div style={{display:"flex",gap:8}}>
            <Pill onClick={go} bg="linear-gradient(135deg,#F2A8BB,#8060B0)" style={{flex:1,borderRadius:14,fontSize:14,padding:"12px 0",justifyContent:"center"}}>
              ✨ Generar menú completo
            </Pill>
            <Pill onClick={onClose} bg={T.cardBorder} color={T.mainText} style={{borderRadius:14,padding:"12px 16px"}}>Cancelar</Pill>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Add Item Modal ─────────────────────────────────────────────────────────────
function AddItemModal({recipes,ingredients,onAdd,onClose}){
  const [tab,setTab]=useState("recipe");
  const [search,setSearch]=useState("");
  const [newIngName,setNewIngName]=useState("");
  const [newIngQty,setNewIngQty]=useState("");

  const filteredRecipes=recipes.filter(r=>!search||r.name.toLowerCase().includes(search.toLowerCase()));
  const filteredIngs=ingredients.filter(i=>!search||i.name.toLowerCase().includes(search.toLowerCase()));

  function addNewIng(){
    if(!newIngName.trim())return;
    onAdd({id:Date.now(),name:newIngName.trim(),qty:newIngQty.trim(),macros:{},recipeId:null,rating:0,isIngredient:true});
    setNewIngName("");setNewIngQty("");
  }

  return(
    <div style={{position:"fixed",inset:0,background:"#3D252580",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:600}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"22px 22px 0 0",padding:"18px 16px 44px",width:"100%",maxWidth:480,maxHeight:"72vh",overflow:"auto"}}>
        <div style={{width:36,height:4,background:T.cardBorder,borderRadius:4,margin:"0 auto 14px"}} />
        <h3 style={{margin:"0 0 12px",color:T.mainText,fontSize:16,fontWeight:800}}>Añadir a la comida</h3>

        <div style={{display:"flex",background:"#F1F5F9",borderRadius:12,padding:3,marginBottom:12}}>
          {[["recipe","🍽 Receta"],["ingredient","🥦 Ingrediente"]].map(([id,label])=>(
            <button key={id} onClick={()=>{setTab(id);setSearch("");}} style={{flex:1,padding:"7px 0",borderRadius:10,border:"none",fontWeight:800,fontSize:13,cursor:"pointer",background:tab===id?"#fff":"transparent",color:tab===id?T.mainText:T.navInactive,boxShadow:tab===id?"0 1px 4px #0002":"none"}}>{label}</button>
          ))}
        </div>

        <div style={{position:"relative",marginBottom:12}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:T.placeholder}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={tab==="recipe"?"Buscar receta...":"Buscar ingrediente..."} style={{...inp,paddingLeft:34}} />
        </div>

        {tab==="recipe"&&(
          <>
            {filteredRecipes.length===0&&<p style={{color:T.placeholder,fontSize:13,textAlign:"center",padding:16}}>No hay recetas. Créalas en 👩‍🍳</p>}
            {filteredRecipes.map(r=>(
              <div key={r.id} onClick={()=>onAdd({id:Date.now(),name:r.name,macros:r.macros||{},recipeId:r.id,rating:r.rating||0,isIngredient:false})}
                style={{padding:"11px 14px",borderRadius:12,border:`1.5px solid ${T.cardBorder}`,cursor:"pointer",marginBottom:8}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=T.accentPurple;e.currentTarget.style.background="#F5F0FF";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=T.cardBorder;e.currentTarget.style.background="#fff";}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:14,color:T.mainText}}>{r.name}</div>
                    <div style={{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}}>
                      {r.category&&<CategoryBadge cat={r.category} />}
                      {(r.dietTags||[]).slice(0,2).map(t=><span key={t} style={{fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:20,background:"#F0FDF4",color:T.accentMint}}>{t}</span>)}
                    </div>
                  </div>
                  {r.rating>0&&<Stars value={r.rating} size={12} />}
                </div>
              </div>
            ))}
          </>
        )}

        {tab==="ingredient"&&(
          <>
            <div style={{background:"#F0FDF8",borderRadius:12,padding:12,marginBottom:12,border:`1px solid ${T.mealTagBorder}40`}}>
              <div style={{fontSize:11,fontWeight:800,color:T.accentMint,marginBottom:8}}>AÑADIR NUEVO</div>
              <div style={{display:"flex",gap:6}}>
                <input value={newIngName} onChange={e=>setNewIngName(e.target.value)} placeholder="Nombre" style={{...inp,flex:1,fontSize:13}} onKeyDown={e=>e.key==="Enter"&&addNewIng()} />
                <input value={newIngQty} onChange={e=>setNewIngQty(e.target.value)} placeholder="Cant." style={{...inp,width:70,fontSize:13}} onKeyDown={e=>e.key==="Enter"&&addNewIng()} />
                <Pill onClick={addNewIng} bg={T.accentMint} style={{borderRadius:12,padding:"8px 14px",fontSize:16}}>+</Pill>
              </div>
            </div>
            {filteredIngs.length>0&&<div style={{fontSize:11,fontWeight:800,color:T.placeholder,marginBottom:8,letterSpacing:0.5}}>GUARDADOS</div>}
            {filteredIngs.map(ing=>(
              <div key={ing.id} onClick={()=>onAdd({id:Date.now(),name:ing.name,macros:{},recipeId:null,rating:0,isIngredient:true})}
                style={{padding:"10px 14px",borderRadius:12,border:`1.5px solid ${T.cardBorder}`,cursor:"pointer",marginBottom:7,display:"flex",alignItems:"center",gap:8}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=T.accentMint;e.currentTarget.style.background="#F0FDF8";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=T.cardBorder;e.currentTarget.style.background="#fff";}}>
                {ing.category&&<CategoryBadge cat={ing.category} />}
                <span style={{fontWeight:700,fontSize:14,color:T.mainText,flex:1}}>{ing.name}</span>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

// ── Meal Slot ──────────────────────────────────────────────────────────────────
function MealSlot({meal,slot,onChange,recipes,ingredients,isLast,onGoToRecipe}){
  const [showAdd,setShowAdd]=useState(false);
  const items=slot.items||[];

  function addItem(item){onChange({...slot,items:[...items,item]});setShowAdd(false);}
  function removeItem(id){onChange({...slot,items:items.filter(i=>i.id!==id)});}
  function rateItem(id,stars){onChange({...slot,items:items.map(i=>i.id===id?{...i,rating:stars}:i)});}

  const tagStyle={background:T.mealTag,color:T.mealTagText,border:`1.5px solid ${T.mealTagBorder}`,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:900,letterSpacing:1,flexShrink:0,minWidth:65,textAlign:"center"};

  return(
    <div style={{borderBottom:isLast?"none":`1px solid ${T.navBorder}`,paddingBottom:isLast?0:12,marginBottom:isLast?0:12}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:items.length?8:0}}>
        <div style={tagStyle}>{meal.toUpperCase()}</div>
        <button onClick={()=>setShowAdd(true)} style={{background:T.dayPill,color:T.dayPillText,border:"none",borderRadius:20,padding:"4px 13px",fontSize:12,fontWeight:800,cursor:"pointer"}}>+ Añadir</button>
      </div>

      {items.length===0&&<div style={{paddingLeft:74,fontSize:13,color:T.placeholder,fontStyle:"italic"}}>Sin platos</div>}

      {items.map((item,idx)=>{
        const linked=item.recipeId?recipes.find(r=>r.id===item.recipeId):null;
        return(
          <div key={item.id} style={{marginLeft:74,marginTop:idx===0?4:6,background:"#FAFAFA",borderRadius:12,padding:"9px 11px",border:`1px solid ${T.cardBorder}`}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:6}}>
              <div style={{flex:1,minWidth:0}}>
                <div onClick={()=>item.recipeId&&onGoToRecipe(item.recipeId)}
                  style={{fontSize:14,fontWeight:700,color:item.recipeId?T.accentPurple:T.mainText,lineHeight:1.3,cursor:item.recipeId?"pointer":"default",textDecoration:item.recipeId?"underline":"none"}}>
                  {item.name}
                  {item.isIngredient&&<span style={{fontSize:10,color:T.accentMint,marginLeft:5,fontWeight:800}}>🥦</span>}
                </div>
                {linked&&<><DietChips tags={linked.dietTags} />{linked.category&&<span style={{marginTop:3,display:"inline-block"}}><CategoryBadge cat={linked.category} /></span>}</>}
                <MacroChips macros={item.macros} />
                <div style={{marginTop:5}}><Stars value={item.rating||0} onChange={s=>rateItem(item.id,s)} size={16} /></div>
              </div>
              <button onClick={()=>removeItem(item.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.placeholder,fontSize:18,lineHeight:1,flexShrink:0}}>×</button>
            </div>
          </div>
        );
      })}

// ── Smart Shopping List ────────────────────────────────────────────────────────
function ShoppingList({items,setItems}){
  const [newItem,setNewItem]=useState("");
  const [newQty,setNewQty]=useState("");

  // Parse quantity numbers from strings like "6 unidades", "200g", "2"
  function parseQty(str){
    if(!str)return null;
    const match=str.match(/(\d+(?:[.,]\d+)?)/);
    return match?parseFloat(match[1].replace(",",".")):null;
  }
  function unitOf(str){
    if(!str)return "";
    return str.replace(/[\d.,]+/g,"").trim();
  }

  function add(name="",qty=""){
    const n=(name||newItem).trim();
    const q=(qty||newQty).trim();
    if(!n)return;

    // Check if same item exists (case insensitive)
    const existing=items.find(i=>!i.done&&i.name.toLowerCase()===n.toLowerCase());
    if(existing){
      // Try to sum quantities
      const existNum=parseQty(existing.qty);
      const newNum=parseQty(q);
      const existUnit=unitOf(existing.qty);
      const newUnit=unitOf(q);
      if(existNum!==null&&newNum!==null&&(existUnit===newUnit||!existUnit||!newUnit)){
        const sum=existNum+newNum;
        const unit=existUnit||newUnit;
        const sumStr=Number.isInteger(sum)?`${sum}${unit?` ${unit}`:""}`:(`${sum}${unit?` ${unit}`:""}`);
        const u=items.map(i=>i.id===existing.id?{...i,qty:sumStr}:i);
        setItems(u);ss("shopping",u);
        if(!name){setNewItem("");setNewQty("");}
        return;
      }
    }

    const u=[...items,{id:Date.now(),name:n,qty:q,done:false}];
    // Sort alphabetically (pending items)
    setItems(u);ss("shopping",u);
    if(!name){setNewItem("");setNewQty("");}
  }

  function toggle(id){const u=items.map(i=>i.id===id?{...i,done:!i.done}:i);setItems(u);ss("shopping",u);}
  function remove(id){const u=items.filter(i=>i.id!==id);setItems(u);ss("shopping",u);}

  // Sort pending alphabetically
  const pending=[...items.filter(i=>!i.done)].sort((a,b)=>a.name.localeCompare(b.name,"es"));
  const done=items.filter(i=>i.done);

  return(
    <div style={{maxWidth:480,margin:"0 auto"}}>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        <input value={newItem} onChange={e=>setNewItem(e.target.value)} placeholder="Ingrediente..." style={{...inp,flex:1}} onKeyDown={e=>e.key==="Enter"&&add()} />
        <input value={newQty} onChange={e=>setNewQty(e.target.value)} placeholder="Cant." style={{...inp,width:80}} onKeyDown={e=>e.key==="Enter"&&add()} />
        <Pill onClick={()=>add()} bg={T.accentMint} style={{borderRadius:14,padding:"8px 14px",fontSize:18}}>+</Pill>
      </div>

      {items.length===0&&<div style={{textAlign:"center",color:T.placeholder,padding:48,fontSize:15}}>🛒 Lista vacía</div>}

      {pending.length>0&&(
        <div style={{fontSize:11,fontWeight:800,color:T.placeholder,marginBottom:8,letterSpacing:0.5}}>POR COMPRAR ({pending.length})</div>
      )}
      {pending.map(item=>(
        <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:T.cardBg,border:`1.5px solid ${T.cardBorder}`,borderRadius:14,marginBottom:7}}>
          <div onClick={()=>toggle(item.id)} style={{width:22,height:22,borderRadius:7,border:`2px solid ${T.mealTag}`,cursor:"pointer",flexShrink:0}} />
          <span style={{flex:1,fontSize:14,color:T.mainText,fontWeight:600}}>{item.name}</span>
          {item.qty&&<span style={{fontSize:13,color:T.accentMint,fontWeight:800,background:"#F0FDF8",padding:"2px 9px",borderRadius:20}}>{item.qty}</span>}
          <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.placeholder,fontSize:20}}>×</button>
        </div>
      ))}

      {done.length>0&&(
        <>
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0 8px"}}>
            <span style={{fontSize:11,color:T.placeholder,fontWeight:800}}>COMPLETADO ({done.length})</span>
            <Pill onClick={()=>{const u=items.filter(i=>!i.done);setItems(u);ss("shopping",u);}} bg="#E57373" style={{padding:"3px 12px",fontSize:11}}>Limpiar</Pill>
          </div>
          {done.map(item=>(
            <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:"#F8F4F3",border:`1.5px solid ${T.cardBorder}`,borderRadius:14,marginBottom:7,opacity:0.6}}>
              <div onClick={()=>toggle(item.id)} style={{width:22,height:22,borderRadius:7,border:`2px solid ${T.mealTag}`,background:T.mealTag,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:12}}>✓</span></div>
              <span style={{flex:1,fontSize:14,color:T.mainText,textDecoration:"line-through"}}>{item.name}</span>
              {item.qty&&<span style={{fontSize:13,color:T.subText,fontWeight:700}}>{item.qty}</span>}
              <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.placeholder,fontSize:20}}>×</button>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

  async function handleExtract(){
    if(!urlInput.trim())return;

      const prompt=`URL: ${urlInput}\nExtract recipe. Respond ONLY valid JSON no markdown:\n{"name":"","notes":"","elaboration":"","category":"Pollo|Ternera|Cerdo|Pescado|Marisco|Verdura|Legumbre|Huevo|Pasta|Arroz|Sopa|Ensalada|Fruta|Lácteo|Otro","dietTags":[],"prepTime":"","ingredients":[{"name":"","qty":""}],"macros":{"kcal":"","prot":"","carbs":"","fat":""}}`;

      const text=data.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();

          {r.ingredients&&r.ingredients.length>0&&(
            <div style={{background:"#F0FDF8",borderRadius:14,padding:14,marginBottom:14,border:`1px solid ${T.mealTagBorder}40`}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:800,color:T.accentMint}}>🧺 INGREDIENTES</div>
                <Pill onClick={()=>r.ingredients.forEach(i=>onAddToCart(i.name,i.qty))} bg={T.accentMint} style={{padding:"4px 12px",fontSize:11,borderRadius:12}}>🛒 Añadir todos</Pill>
              </div>
              {r.ingredients.map((ing,idx)=>(
                <div key={idx} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"#fff",borderRadius:10,marginBottom:5,border:`1px solid ${T.cardBorder}`}}>
                  <span style={{flex:1,fontSize:13,color:T.mainText,fontWeight:600}}>{ing.name}</span>
                  {ing.qty&&<span style={{fontSize:12,color:T.subText,fontWeight:700}}>{ing.qty}</span>}
                  <button onClick={()=>onAddToCart(ing.name,ing.qty)} style={{background:T.accentMint,border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:800}}>+ 🛒</button>
                </div>
              ))}
            </div>
          )}
          {r.elaboration&&(<div style={{background:"#FFF8ED",borderRadius:14,padding:14,marginBottom:14,border:"1px solid #FDE8C060"}}><div style={{fontSize:12,fontWeight:800,color:"#92400E",marginBottom:8}}>👩‍🍳 ELABORACIÓN</div><p style={{color:"#78350F",fontSize:14,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{r.elaboration}</p></div>)}
          {r.notes&&<p style={{color:T.subText,fontSize:14,lineHeight:1.7,marginBottom:12,whiteSpace:"pre-wrap"}}>{r.notes}</p>}
          {r.comment&&(<div style={{background:"#FFF8ED",borderRadius:12,padding:"10px 14px",marginBottom:12,border:"1.5px solid #FDE8C0"}}><div style={{fontSize:11,fontWeight:800,color:"#92400E",marginBottom:4}}>💬 MI OPINIÓN</div><p style={{fontSize:14,color:"#78350F",lineHeight:1.6}}>{r.comment}</p></div>)}
          <MacroChips macros={r.macros||{}} />
          <div style={{display:"flex",gap:8,marginTop:18}}>
            <Pill onClick={()=>{setEditForm(r);setView("form");}} bg="#E6933A" style={{borderRadius:14}}>✏️ Editar</Pill>
            <Pill onClick={()=>deleteRecipe(r.id)} bg="#E57373" style={{borderRadius:14}}>🗑 Eliminar</Pill>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <div style={{position:"relative",flex:1}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,color:T.placeholder}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar receta..." style={{...inp,paddingLeft:34}} />
        </div>
        <button onClick={()=>setShowFilters(p=>!p)} style={{background:showFilters?"#FFF0F3":"#fff",border:`1.5px solid ${showFilters?T.accentPink:T.cardBorder}`,borderRadius:12,padding:"0 14px",fontSize:18,cursor:"pointer"}}>⚙️</button>
      </div>

      {showFilters&&(
        <div style={{background:"#FFF8F7",borderRadius:14,padding:14,marginBottom:14,border:`1.5px solid ${T.cardBorder}`}}>
          <div style={{fontSize:11,fontWeight:800,color:T.placeholder,marginBottom:7}}>CATEGORÍA</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>{["Todas",...CATEGORIES].map(cat=>(<div key={cat} onClick={()=>setFilterCat(cat)} style={{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",border:`1.5px solid ${filterCat===cat?T.accentPink:T.cardBorder}`,background:filterCat===cat?"#FFF0F3":"#fff",color:filterCat===cat?T.accentPink:T.subText}}>{cat}</div>))}</div>
          <div style={{fontSize:11,fontWeight:800,color:T.placeholder,marginBottom:7}}>DIETA</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>{["Todas",...DIET_TAGS].map(tag=>(<div key={tag} onClick={()=>setFilterDiet(tag)} style={{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",border:`1.5px solid ${filterDiet===tag?T.accentMint:T.cardBorder}`,background:filterDiet===tag?"#F0FDF4":"#fff",color:filterDiet===tag?T.accentMint:T.subText}}>{tag}</div>))}</div>
          <div style={{fontSize:11,fontWeight:800,color:T.placeholder,marginBottom:7}}>VALORACIÓN MÍNIMA</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <Stars value={filterRating} onChange={v=>setFilterRating(v===filterRating?0:v)} size={24} />
            {filterRating>0&&<span onClick={()=>setFilterRating(0)} style={{fontSize:12,color:T.placeholder,cursor:"pointer",textDecoration:"underline"}}>Quitar</span>}
          </div>
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span style={{fontSize:12,color:T.placeholder,fontWeight:700}}>{filtered.length} receta{filtered.length!==1?"s":""}</span>
        <Pill onClick={()=>{setEditForm(null);setView("form");}} bg={T.dayPill} color={T.dayPillText} style={{borderRadius:14,padding:"7px 18px"}}>+ Nueva receta</Pill>
      </div>

      {filtered.length===0&&<div style={{textAlign:"center",color:T.placeholder,padding:56,fontSize:15}}>{recipes.length===0?"📖 Sin recetas aún":"🔍 Sin resultados"}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(r=>(
          <div key={r.id} onClick={()=>{setDetailId(r.id);setView("detail");}} style={{background:T.cardBg,borderRadius:16,padding:"14px 16px",border:`1.5px solid ${T.cardBorder}`,cursor:"pointer",transition:"all 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=T.accentPink}
            onMouseLeave={e=>e.currentTarget.style.borderColor=T.cardBorder}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,color:T.mainText,fontSize:15,marginBottom:5}}>{r.name}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:4}}>
                  {r.category&&<CategoryBadge cat={r.category} />}
                  {(r.dietTags||[]).slice(0,2).map(t=><span key={t} style={{fontSize:10,fontWeight:700,padding:"1px 8px",borderRadius:20,background:"#F0FDF4",color:T.accentMint}}>{t}</span>)}
                </div>
                {r.rating>0&&<Stars value={r.rating} size={14} />}
                {r.prepTime&&<div style={{fontSize:11,color:T.placeholder,marginTop:3}}>⏱ {r.prepTime}</div>}
              </div>
              <div style={{color:T.placeholder,fontSize:20,flexShrink:0}}>›</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Week Dropdown ──────────────────────────────────────────────────────────────
function WeekDropdown({weeks,currentWeek,setCurrentWeek,onAddWeek,weekStarts,setWeekStarts}){
  const [open,setOpen]=useState(false);
  return(
    <div style={{position:"relative",flex:1}}>
      <div onClick={()=>setOpen(p=>!p)} style={{background:"#FFF3F0",border:`1.5px solid ${T.cardBorder}`,borderRadius:30,padding:"11px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
        <div>
          <span style={{fontWeight:800,fontSize:15,color:T.mainText}}>Semana {currentWeek+1}</span>
          {weekStarts[currentWeek]&&<span style={{fontSize:11,color:T.subText,marginLeft:8}}>{new Date(weekStarts[currentWeek]).toLocaleDateString("es-ES",{day:"numeric",month:"short"})}</span>}
        </div>
        <span style={{color:T.subText,fontSize:20}}>⌄</span>
      </div>
      {open&&(
        <div style={{position:"absolute",top:"110%",left:0,right:0,background:"#fff",borderRadius:16,border:`1.5px solid ${T.cardBorder}`,boxShadow:"0 8px 28px #0002",zIndex:200,overflow:"hidden"}}>
          {weeks.map((_,i)=>(
            <div key={i} style={{padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${T.navBorder}`,background:currentWeek===i?"#FFF0F3":"#fff",cursor:"pointer"}} onClick={()=>{setCurrentWeek(i);setOpen(false);}}>
              <span style={{fontWeight:700,fontSize:14,color:currentWeek===i?T.accentPink:T.mainText}}>Semana {i+1}</span>
              <input type="date" value={weekStarts[i]||""} onClick={e=>e.stopPropagation()} onChange={e=>{const u=[...weekStarts];u[i]=e.target.value;setWeekStarts(u);ss("weekStarts",u);}} style={{fontSize:11,border:`1px solid ${T.cardBorder}`,borderRadius:8,padding:"3px 6px",color:T.subText,background:"#FFF8F7"}} />
            </div>
          ))}
          <div onClick={()=>{onAddWeek();setOpen(false);}} style={{padding:"13px 20px",fontWeight:700,fontSize:14,color:T.accentMint,cursor:"pointer"}}>+ Nueva semana</div>
        </div>
      )}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]                     = useState("planner");
  const [weeks,setWeeks]                 = useState(()=>migrateWeeks());
  const [currentWeek,setCurrentWeek]     = useState(0);
  const [weekStarts,setWeekStarts]       = useState(()=>ls("weekStarts",["",""]));
  const [shoppingItems,setShoppingItems] = useState(()=>ls("shopping",[]));
  const [recipes,setRecipes]             = useState(()=>ls("recipes",[]));
  const [ingredients,setIngredients]     = useState(()=>ls("ingredients",[]));
  const [openRecipeId,setOpenRecipeId]   = useState(null);
  const [subTab,setSubTab]               = useState("recipes");
  const [showAI,setShowAI]               = useState(false);

  function onSlotChange(weekIdx,day,meal,val){
    const updated=weeks.map((w,i)=>i!==weekIdx?w:{...w,[day]:{...w[day],[meal]:val}});
    setWeeks(updated);ss("weeks3",updated);
  }

  function handleAIMenu(menu){
    // Fill current week with AI-generated menu
    const updatedWeek={...weeks[currentWeek]};
    DAYS.forEach(day=>{
      if(menu[day]){
        MEALS.forEach(meal=>{
          if(menu[day][meal]){
            const items=(menu[day][meal]||[]).map((item,idx)=>({
              id:Date.now()+Math.random()*10000+idx,
              name:item.name,
              macros:{},recipeId:null,rating:0,isIngredient:false,
              aiGenerated:true
            }));
            updatedWeek[day]={...updatedWeek[day],[meal]:{items}};
          }
        });
      }
    });
    const updated=weeks.map((w,i)=>i===currentWeek?updatedWeek:w);
    setWeeks(updated);ss("weeks3",updated);
    setShowAI(false);
  }

  function goToRecipe(recipeId){setOpenRecipeId(recipeId);setTab("recipes");setSubTab("recipes");}

  function addToCart(name,qty=""){
    // Use the smart add logic from ShoppingList
    const existing=shoppingItems.find(i=>!i.done&&i.name.toLowerCase()===name.toLowerCase());
    function parseQty(str){if(!str)return null;const m=str.match(/(\d+(?:[.,]\d+)?)/);return m?parseFloat(m[1].replace(",",".")):null;}
    function unitOf(str){if(!str)return "";return str.replace(/[\d.,]+/g,"").trim();}
    if(existing){
      const en=parseQty(existing.qty),nn=parseQty(qty),eu=unitOf(existing.qty),nu=unitOf(qty);
      if(en!==null&&nn!==null&&(eu===nu||!eu||!nu)){
        const sum=en+nn,unit=eu||nu;
        const sumStr=`${Number.isInteger(sum)?sum:sum.toFixed(1)}${unit?` ${unit}`:""}`;
        const u=shoppingItems.map(i=>i.id===existing.id?{...i,qty:sumStr}:i);
        setShoppingItems(u);ss("shopping",u);return;
      }
    }
    const u=[...shoppingItems,{id:Date.now(),name,qty,done:false}];
    setShoppingItems(u);ss("shopping",u);
  }

  function addAllIngredientsToCart(){
    const data=weeks[currentWeek];
    let added=0;
    DAYS.forEach(d=>MEALS.forEach(m=>{
      (data[d][m]?.items||[]).forEach(item=>{
        if(item.recipeId){
          const r=recipes.find(x=>x.id===item.recipeId);
          if(r&&r.ingredients&&r.ingredients.length){r.ingredients.forEach(ing=>addToCart(ing.name,ing.qty));added++;}
        }
      });
    }));
    if(added>0)setTab("shopping");
    else alert("Vincula recetas con ingredientes al planning primero.");
  }

  function addWeek(){
    const updated=[...weeks,makeWeek()];const us=[...weekStarts,""];
    setWeeks(updated);ss("weeks3",updated);setWeekStarts(us);ss("weekStarts",us);setCurrentWeek(weeks.length);
  }

  const filled=DAYS.reduce((n,d)=>n+MEALS.filter(m=>(weeks[currentWeek][d][m]?.items||[]).length>0).length,0);
  const NAV=[{id:"shopping",icon:"🛒",label:"Compra"},{id:"planner",icon:"🥗",label:"Plan"},{id:"recipes",icon:"👩‍🍳",label:"Recetas"}];

  return(
    <div style={{minHeight:"100vh",background:T.pageBg,paddingBottom:90}}>
      {/* Top bar */}
      <div style={{padding:"16px 16px 12px",background:T.pageBg,position:"sticky",top:0,zIndex:50}}>
        {tab==="planner"&&(
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <WeekDropdown weeks={weeks} currentWeek={currentWeek} setCurrentWeek={setCurrentWeek} onAddWeek={addWeek} weekStarts={weekStarts} setWeekStarts={setWeekStarts} />
            <div style={{background:"#FFF3F0",border:`1.5px solid ${T.cardBorder}`,borderRadius:30,width:48,height:48,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:T.subText,flexShrink:0}}>
              <span>{filled}</span><span style={{fontSize:9}}>/{DAYS.length*MEALS.length}</span>
            </div>
          </div>
        )}
        {tab==="shopping"&&<div style={{fontWeight:900,fontSize:20,color:T.mainText,textAlign:"center"}}>🛒 Lista de la Compra</div>}
        {tab==="recipes"&&(
          <div>
            <div style={{fontWeight:900,fontSize:20,color:T.mainText,textAlign:"center",marginBottom:10}}>👩‍🍳 Recetas</div>
            <div style={{display:"flex",background:"#F1F5F9",borderRadius:12,padding:3}}>
              {[["recipes","🍽 Mis Recetas"],["ingredients","🥦 Ingredientes"]].map(([id,label])=>(
                <button key={id} onClick={()=>setSubTab(id)} style={{flex:1,padding:"7px 0",borderRadius:10,border:"none",fontWeight:800,fontSize:13,cursor:"pointer",background:subTab===id?"#fff":"transparent",color:subTab===id?T.mainText:T.navInactive,boxShadow:subTab===id?"0 1px 4px #0002":"none"}}>{label}</button>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Content */}
      <div style={{padding:"4px 14px 20px"}}>
        {tab==="planner"&&<WeekView weeks={weeks} currentWeek={currentWeek} onSlotChange={onSlotChange} recipes={recipes} ingredients={ingredients} weekStarts={weekStarts} onAddAllToCart={addAllIngredientsToCart} onGoToRecipe={goToRecipe} onOpenAI={()=>setShowAI(true)} />}
        {tab==="shopping"&&<ShoppingList items={shoppingItems} setItems={setShoppingItems} />}
        {tab==="recipes"&&subTab==="recipes"&&<Recipes recipes={recipes} setRecipes={setRecipes} onAddToCart={addToCart} openRecipeId={openRecipeId} clearOpenRecipe={()=>setOpenRecipeId(null)} />}
        {tab==="recipes"&&subTab==="ingredients"&&<IngredientLibrary ingredients={ingredients} setIngredients={setIngredients} />}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:T.navBg,borderTop:`1.5px solid ${T.navBorder}`,display:"flex",padding:"8px 0 18px"}}>
        {NAV.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);if(t.id==="recipes")setSubTab("recipes");}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,border:"none",background:"none",cursor:"pointer",padding:"4px 0"}}>
            <span style={{fontSize:22}}>{t.icon}</span>
            <span style={{fontSize:11,fontWeight:900,color:tab===t.id?T.accentPink:T.navInactive}}>{t.label}</span>
            {tab===t.id&&<div style={{width:18,height:3,background:T.accentPink,borderRadius:2}} />}
          </button>
        ))}
      </div>

      {showAI&&<AIMenuModal onGenerate={handleAIMenu} onClose={()=>setShowAI(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
