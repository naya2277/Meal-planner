<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Meal Planner</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#FAE8E4;font-family:'Nunito',sans-serif;}
    button,input,textarea{font-family:'Nunito',sans-serif;}
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

/* =========================
   UTIL
========================= */
function ls(k,d){try{return JSON.parse(localStorage.getItem(k)) ?? d;}catch{return d;}}
function ss(k,v){localStorage.setItem(k,JSON.stringify(v));}

/* =========================
   APP BASE
========================= */

function App(){
  const [menu,setMenu] = useState(null);
  const [showAI,setShowAI] = useState(false);

  return(
    <div style={{padding:20}}>

      <h1>🥗 Meal Planner</h1>

      <button
        onClick={()=>setShowAI(true)}
        style={{
          padding:12,
          background:"#E8879E",
          color:"#fff",
          border:"none",
          borderRadius:12,
          fontWeight:900
        }}
      >
        Generar menú IA
      </button>

      {menu && (
        <div style={{marginTop:20}}>
          <h3>Menú generado</h3>
          <pre style={{background:"#fff",padding:10,borderRadius:10}}>
            {JSON.stringify(menu,null,2)}
          </pre>
        </div>
      )}

      {showAI && (
        <AIModal
          onClose={()=>setShowAI(false)}
          onGenerate={(m)=>{
            setMenu(m);
            setShowAI(false);
          }}
        />
      )}

    </div>
  );
}

/* =========================
   IA MODAL (GEMINI READY)
========================= */

function AIModal({onClose,onGenerate}){

  const [avoid,setAvoid] = useState("");
  const [extra,setExtra] = useState("");
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState("");

  async function generate(){
    setLoading(true);
    setError("");

    try{
      const res = await fetch("/api/menu",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          preferences: extra,
          avoid: avoid
        })
      });

      const data = await res.json();

      console.log("API:", data);

      if(!res.ok){
        throw new Error("HTTP error");
      }

      if(!data || !data.menu){
        throw new Error("Sin menú");
      }

      onGenerate(data.menu);

    }catch(e){
      console.error(e);
      setError("⚠️ Error al generar menú. Revisa API.");
    }

    setLoading(false);
  }

  return(
    <div style={{
      position:"fixed",
      inset:0,
      background:"#00000066",
      display:"flex",
      alignItems:"flex-end",
      justifyContent:"center"
    }}
    onClick={onClose}
    >

      <div
        onClick={e=>e.stopPropagation()}
        style={{
          background:"#fff",
          width:"100%",
          maxWidth:520,
          padding:20,
          borderRadius:"20px 20px 0 0"
        }}
      >

        <h2>🤖 Generar menú IA</h2>

        <p style={{fontSize:12,opacity:0.7}}>
          Keto · Anti-inflamatorio · 7 días
        </p>

        <textarea
          placeholder="Preferencias (ej: más pescado, keto estricto...)"
          value={extra}
          onChange={e=>setExtra(e.target.value)}
          style={{width:"100%",padding:10,marginTop:10}}
        />

        <input
          placeholder="Alimentos a evitar"
          value={avoid}
          onChange={e=>setAvoid(e.target.value)}
          style={{width:"100%",padding:10,marginTop:10}}
        />

        {error && (
          <div style={{color:"red",marginTop:10,fontWeight:700}}>
            {error}
          </div>
        )}

        <button
          onClick={generate}
          disabled={loading}
          style={{
            width:"100%",
            marginTop:15,
            padding:12,
            background:"#E8879E",
            color:"#fff",
            border:"none",
            borderRadius:12,
            fontWeight:900
          }}
        >
          {loading ? "Generando..." : "Generar menú"}
        </button>

      </div>
    </div>
  );
}

/* =========================
   RENDER
========================= */

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
